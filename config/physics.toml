# ALLEX Twin — Physics configuration (TOML)
#
# Edit values to override defaults. Disable/re-enable the ALLEX extension in
# Isaac Sim's Extension Manager to reload. Keys commented out (#) fall back to
# whatever Isaac Sim / Newton provide at startup.
#
# Sections:
#   [usd.physics_scene]        → USD /physicsScene prim (UsdPhysics.Scene)
#   [usd.physics_scene.physx]  → PhysxSceneAPI attrs (PhysX-only; Newton ignores)
#   [newton]                   → isaacsim.physics.newton.NewtonConfig
#   [newton.solver]            → NewtonConfig.solver_cfg (MuJoCoSolverConfig)
#   [allex.equality]           → MJCF equality constraint tuning
#   [allex.equality.armature_overrides] → per-joint armature boosts
#
# Defaults here mirror the values Newton/Isaac Sim would use at startup unless
# explicitly stated otherwise.

# ==========================================================================
# USD /physicsScene — UsdPhysics.Scene + PhysxSceneAPI
# ==========================================================================
[usd.physics_scene]
# Global gravity. Units: m/s², direction is a unit vector.
# gravity_magnitude = 9.81
# gravity_direction = [0.0, 0.0, -1.0]

[usd.physics_scene.physx]
# NOTE: these are PhysX-specific. Under the Newton app they're IGNORED by the
# physics engine but still authored on the USD stage (useful if you later fall
# back to PhysX). Leave commented to preserve Isaac Sim defaults.
#
# friction_cone_type = "patch"          # "patch" | "oneDirection"
# solver_type = "PGS"                   # "PGS" | "TGS"
# broadphase_type = "SAP"               # "SAP" | "MBP"
# collision_system = "PCM"
# enable_ccd = false
# enable_stabilization = true
# enable_enhanced_determinism = false
# min_position_iteration_count = 1
# max_position_iteration_count = 255
# min_velocity_iteration_count = 1
# max_velocity_iteration_count = 255
# bounce_threshold = 2.0
# friction_offset_threshold = 0.04
# time_steps_per_second = 50

# ==========================================================================
# Newton Physics — isaacsim.physics.newton.NewtonConfig
# ==========================================================================
[newton]
# Reference: isaacsim.physics.newton.impl.newton_config.NewtonConfig
#
# Actual Python-side field names. Keys absent here fall back to NewtonConfig
# defaults.  Note: "capture_graph_physics_step" / "auto_switch_on_startup" are
# carb kit settings (under exts."isaacsim.physics.newton".*), NOT NewtonConfig
# fields — they must be set in kit/settings.toml, not here.

# Cancel Newton USD importer's implicit deg→rad drive-gain multiplication.
# USD drive stiffness/damping are SI (N·m/rad). Setting pd_scale = π/180 makes
# the importer's (1 / DegreesToRadian / pd_scale) factor equal to 1.0.
# Leaving at default 1.0 would scale SI values by ~57.3× (broken on MJCF-style
# USD exports).
pd_scale = 0.017453292519943295  # π / 180

# Common NewtonConfig fields (uncomment to override):
# num_substeps = 1
# debug_mode = false
# use_cuda_graph = true                  # CUDA graph capture for physics step
# time_step_app = true
# physics_frequency = 600.0              # Hz (null/absent = use USD timeStepsPerSecond)
# update_fabric = true
# disable_physx_fabric_tracker = true
# collapse_fixed_joints = false
# fix_missing_xform_ops = true
# contact_ke = 1.0e4                     # contact stiffness (N/m)
# contact_kd = 1.0e2                     # contact damping
# contact_kf = 1.0e1                     # contact friction stiffness
# contact_mu = 1.0                       # coefficient of friction
# contact_ka = 0.5
# restitution = 0.0
# contact_margin = 0.01
# soft_contact_margin = 0.01

# ==========================================================================
# Newton Solver — MuJoCoSolverConfig (MuJoCo Warp backend)
# ==========================================================================
[newton.solver]
# Reference: isaacsim.physics.newton.impl.solver_config.MuJoCoSolverConfig
#
# solver_type = "mujoco"                # "xpbd" | "mujoco" | "featherstone" | "semiImplicit"
# njmax = 1200                          # max constraints / world
# nconmax = 200                         # max contact points / world
# iterations = 100                      # solver iterations
# ls_iterations = 15                    # line search iterations
# solver = "newton"                     # "newton" (sparse LDL) | "cg"
# integrator = "implicitfast"           # "euler" | "rk4" | "implicit" | "implicitfast"
# cone = "elliptic"                     # "pyramidal" | "elliptic"
# impratio = 1.0                        # frictional-normal impedance ratio
# use_mujoco_cpu = false                # true = pure MuJoCo CPU backend
# use_mujoco_contacts = true
# disable_contacts = false
# tolerance = 1.0e-8
# ls_tolerance = 0.001
# ls_parallel = true
# update_data_interval = 1
# include_sites = false
# save_to_mjcf = ""                     # non-empty path: dump generated MJCF

# ==========================================================================
# ALLEX — MJCF equality constraint tuning
# ==========================================================================
[allex.equality]
# Default tuning (used by finger coupling constraints).
# solref = (timeconst [s], dampratio)
default_solref_timeconst = 0.05
default_solref_dampratio = 1.0
# solimp = (dmin, dmax, width, midpoint, power)
default_solimp = [0.9, 0.95, 0.001, 0.5, 2.0]

# Softer tuning for the waist 4-bar linkage carrying chest + arms + head.
waist_solref_timeconst = 0.15
waist_solref_dampratio = 1.0
waist_solimp = [0.7, 0.8, 0.002, 0.5, 2.0]

# Minimum rotor inertia (armature) applied to every joint that participates in
# an equality constraint and currently has an armature below this value.
default_armature = 0.01

[allex.equality.armature_overrides]
# Per-joint armature. Applied when the builder's current value is smaller.
# Heavy-load waist joints need significantly more rotor inertia for stability.
Waist_Upper_Pitch_Joint = 2.0
Waist_Pitch_Dummy_Joint = 2.0
Waist_Lower_Pitch_Joint = 0.5
